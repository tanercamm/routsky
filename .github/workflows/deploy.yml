name: Routsky Auto-Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/tanercamm0/routsky
            # Git'i zorla güncelle
            sudo git config --global --add safe.directory /home/tanercamm0/routsky
            sudo git reset --hard HEAD
            sudo git clean -fd
            sudo git pull origin main
            
            # Docker'ı tertemiz baştan kur
            sudo docker compose -f docker-compose.staging.yml down --remove-orphans
            sudo docker compose -f docker-compose.staging.yml build --no-cache
            sudo docker compose -f docker-compose.staging.yml up -d --force-recreate
            
            # Nginx'i bekle ve mühürle
            sleep 20
            sudo docker cp nginx/conf.d/default.conf routsky_staging_proxy:/etc/nginx/conf.d/default.conf
            sudo docker exec routsky_staging_proxy nginx -s reload