name: Routsky Auto-Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/tanercamm0/routsky
            
            # Git güvenlik hatasını çöz
            git config --global --add safe.directory /home/tanercamm0/routsky
            
            git reset --hard HEAD
            git pull origin main
            
            # 1. Her şeyi durdur
            sudo docker compose -f docker-compose.staging.yml down --remove-orphans
            
            # 2. Önce imajları CACHE KULLANMADAN baştan yarat
            sudo docker compose -f docker-compose.staging.yml build --no-cache
            
            # 3. Şimdi sistemi ayağa kaldır
            sudo docker compose -f docker-compose.staging.yml up -d --force-recreate
            
            # 4. Nginx'i bekle ve mühürle
            sleep 5
            sudo docker cp nginx/conf.d/default.conf routsky_staging_proxy:/etc/nginx/conf.d/default.conf
            sudo docker exec routsky_staging_proxy nginx -s reload