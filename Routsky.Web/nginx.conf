server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse-proxy API calls to the backend container
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_buffering off;
    }

    # Proxy uploaded files (avatars etc.) to the API container
    location /uploads/ {
        proxy_pass         http://api:8080/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Hashed static assets (JS, CSS) — cache forever (hash changes on rebuild)
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching of index.html so new deploys are picked up immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Build-Version "staging-v2-20260311T1750" always;
    }
}
